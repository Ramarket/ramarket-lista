<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RA Market — Lista de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb; --card: #fff; --ink: #1a1a18; --muted: #7a7a72;
    --accent: #e8521a; --green: #16a34a; --blue: #1d4ed8;
    --border: #e0ddd5; --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); min-height: 100vh; padding-bottom: 110px; }

  /* HEADER */
  header { background: var(--ink); color: var(--bg); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
  .top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .brand { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 800; }
  .brand span { color: var(--accent); }
  .header-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: #aaa; text-align: right; line-height: 1.6; }
  .progress-bar-wrap { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 5px; background: #333; border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s; }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 11px; color: #ccc; white-space: nowrap; }

  /* RESPONSAVEL SELECTOR */
  .resp-bar { background: #111; padding: 10px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; }
  .resp-label { font-family: 'DM Mono', monospace; font-size: 10px; color: #888; }
  .resp-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 99px; border: 1.5px solid #333; background: transparent; color: #ccc; cursor: pointer; transition: all .15s; }
  .resp-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* CONTROLS */
  .controls { padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 126px; z-index: 99; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 99px; border: 1.5px solid var(--border); background: var(--card); color: var(--ink); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-finalizar { margin-left: auto; background: var(--green); color: #fff; border-color: var(--green); }
  .btn-finalizar:hover { background: #15803d; border-color: #15803d; color: #fff; }
  .btn-reset { font-size: 11px; color: var(--muted); background: transparent; border: none; cursor: pointer; font-family: 'DM Mono', monospace; text-decoration: underline; }

  /* LOADING */
  #loading { text-align: center; padding: 60px 20px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main { padding: 16px 14px; max-width: 720px; margin: 0 auto; }

  /* CATEGORIA */
  .category-block { margin-bottom: 16px; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); background: var(--card); border: 1px solid var(--border); }
  .category-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--ink); color: #fff; cursor: pointer; user-select: none; }
  .category-header.done { background: #166534; }
  .cat-icon { font-size: 16px; }
  .cat-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; flex: 1; }
  .cat-badge { font-family: 'DM Mono', monospace; font-size: 10px; background: rgba(255,255,255,.15); padding: 2px 8px; border-radius: 99px; }
  .cat-toggle { font-size: 14px; opacity: .6; transition: transform .2s; }
  .category-header.collapsed .cat-toggle { transform: rotate(-90deg); }
  .items-list { padding: 4px 0; }
  .items-list.hidden { display: none; }

  /* ITEM */
  .item-row { border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .item-row.checked { background: #f0fdf4; }
  .item-main { display: flex; align-items: center; gap: 10px; padding: 10px 14px 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .item-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; font-size: 13px; }
  .item-row.checked .item-check { background: var(--green); border-color: var(--green); color: #fff; }
  .urgency-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .urgency-low { background: #fbbf24; } .urgency-med { background: #f97316; } .urgency-high { background: #ef4444; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-row.checked .item-name { text-decoration: line-through; color: var(--muted); }
  .item-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .item-qty-block { text-align: right; flex-shrink: 0; }
  .item-qty-need { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; color: var(--accent); }
  .item-row.checked .item-qty-need { color: var(--green); }
  .item-qty-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 1px; }

  /* PAINEL EXTRA */
  .item-extra { display: none; padding: 0 14px 10px 46px; gap: 10px; align-items: center; flex-wrap: wrap; }
  .item-extra.visible { display: flex; }
  .qty-input-group { display: flex; align-items: center; gap: 6px; background: #f5f2eb; border: 1.5px solid var(--border); border-radius: 8px; padding: 4px 8px; }
  .qty-input-group label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }
  .qty-spinner { display: flex; align-items: center; gap: 4px; }
  .qty-btn { width: 24px; height: 24px; border-radius: 6px; border: 1.5px solid var(--border); background: white; font-size: 15px; font-weight: 700; color: var(--ink); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .1s; flex-shrink: 0; }
  .qty-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .qty-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; min-width: 24px; text-align: center; }
  .sobra-badge { display: none; align-items: center; gap: 5px; background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 8px; padding: 5px 10px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--blue); font-weight: 500; white-space: nowrap; }
  .sobra-badge.visible { display: flex; }
  .extra-toggle { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: none; border: 1px dashed var(--border); border-radius: 6px; padding: 2px 8px; cursor: pointer; transition: all .15s; flex-shrink: 0; }
  .extra-toggle:hover, .extra-toggle.open { border-color: var(--accent); color: var(--accent); }
  .item-actions { padding: 0 14px 8px 46px; display: flex; align-items: center; gap: 8px; }
  .sobra-inline { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--blue); }

  /* MODAL FINALIZAR */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .overlay.visible { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .modal h2 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 4px; }
  .modal .modal-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 20px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 8px; }
  .modal-item { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .modal-item:last-child { border-bottom: none; }
  .modal-item-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-item-qty { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .modal-item-qty.sobra { color: var(--blue); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
  .modal-btn.cancel { background: var(--border); color: var(--ink); }
  .modal-btn.confirm { background: var(--green); color: white; }
  .saving-msg { text-align: center; padding: 20px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--green); display: none; }

  /* FOOTER */
  .footer-summary { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-family: 'DM Mono', monospace; font-size: 11px; z-index: 200; gap: 12px; flex-wrap: wrap; }
  .footer-col { display: flex; flex-direction: column; gap: 1px; }
  .footer-val { font-size: 14px; font-weight: 500; }
  .footer-val.accent { color: var(--accent); }
  .footer-val.blue { color: #93c5fd; }

  /* ERRO / VAZIO */
  .msg-center { text-align: center; padding: 50px 20px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="top-row">
    <div class="brand">RA <span>Market</span></div>
    <div class="header-meta" id="headerMeta">Carregando...</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">—</div>
  </div>
</header>

<div class="resp-bar">
  <span class="resp-label">QUEM ESTÁ COMPRANDO:</span>
  <button class="resp-btn active" onclick="setResp(this,'Rodrigo')">Rodrigo</button>
  <button class="resp-btn" onclick="setResp(this,'Cunhado')">Cunhado</button>
  <button class="resp-btn" onclick="setResp(this,'Irmã')">Irmã</button>
</div>

<div class="controls">
  <button class="btn active" onclick="filterAll(this)">Todos</button>
  <button class="btn" onclick="filterPending(this)">Pendentes</button>
  <button class="btn" onclick="filterChecked(this)">Comprados</button>
  <button class="btn btn-finalizar" onclick="abrirModal()">✓ Finalizar Compra</button>
  <button class="btn-reset" onclick="resetAll()">↺ Resetar</button>
</div>

<div id="loading">
  <div class="spinner"></div><br>Carregando lista do servidor...
</div>

<main id="main" style="display:none"></main>

<div class="footer-summary">
  <div class="footer-col">
    <div style="opacity:.6">ITENS RESTANTES</div>
    <div class="footer-val accent" id="footerTotal">—</div>
  </div>
  <div class="footer-col" style="text-align:right">
    <div style="opacity:.6">SOBRA P/ ESTOQUE</div>
    <div class="footer-val blue" id="footerSobra">0 un.</div>
  </div>
</div>

<!-- MODAL FINALIZAR -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Finalizar Compra</h2>
    <div class="modal-sub" id="modalSub">Resumo do que será enviado para sua irmã confirmar no sistema.</div>
    <div id="modalContent"></div>
    <div class="saving-msg" id="savingMsg">💾 Gravando no sistema...</div>
    <div class="modal-btns" id="modalBtns">
      <button class="modal-btn cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-btn confirm" onclick="confirmarCompra()">Confirmar e Gravar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyeEU0ZEVsaMp4Ow7IR3E57egNN_h34BmUAoxdARVRJqpSaXQF_Z7Ayh2FVf3lu1P5z/exec'; // substitua após publicar o Apps Script
const CAT_ICONS = {
  "Bebidas Alcoólicas":"🍺","Bebidas sem Álcool":"🥤","Congelados":"🧊",
  "Doces e Salgados":"🍫","Higiene Pessoal":"🧴","Limpeza":"🧽",
  "Mercearia":"🛒","Cesta Básica":"📦",
};

// ── STATE ────────────────────────────────────────────────────
let ITEMS = [];
let state = {};   // { canal: { checked, comprado } }
let responsavel = 'Rodrigo';
let filterMode = 'all';

function getKey(item) { return 'c' + item.canal; }

function getComprado(item) {
  const k = getKey(item);
  return (state[k] && state[k].comprado !== undefined) ? state[k].comprado : item.qty;
}
function isChecked(item) { return !!(state[getKey(item)] && state[getKey(item)].checked); }

function saveState() { localStorage.setItem('ra_state_v3', JSON.stringify(state)); }
function loadState() { state = JSON.parse(localStorage.getItem('ra_state_v3') || '{}'); }

// ── CARREGAR DADOS DO SHEETS ─────────────────────────────────
async function carregarLista() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  try {
    const url = SCRIPT_URL + '?action=get_lista&t=' + Date.now();
    const res = await fetch(url);
    const data = await res.json();
    ITEMS = data.items || [];

    const meta = document.getElementById('headerMeta');
    meta.innerHTML = `LISTA DE COMPRAS<br>${data.dataPedido || ''}<br>Residencial Treze 36`;

    loadState();

    // Sincronizar comprado com valor do Sheets se não foi alterado localmente
    ITEMS.forEach(item => {
      const k = getKey(item);
      if (!state[k]) state[k] = { checked: false, comprado: item.qty };
    });

    render();
  } catch(e) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#ef4444">❌ Erro ao carregar lista.</div>
      <div style="font-size:11px;margin-top:8px">Verifique se o Apps Script foi publicado corretamente.</div>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  }
}

// ── INTERAÇÕES ───────────────────────────────────────────────
function setResp(btn, nome) {
  document.querySelectorAll('.resp-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  responsavel = nome;
}

function toggleCheck(key) {
  if (!state[key]) state[key] = {};
  state[key].checked = !state[key].checked;
  saveState(); render();
}

function changeComprado(key, delta, itemQty) {
  if (!state[key]) state[key] = { checked: false, comprado: itemQty };
  const cur = state[key].comprado !== undefined ? state[key].comprado : itemQty;
  state[key].comprado = Math.max(0, cur + delta);
  saveState();
  updateItemBadge(key, itemQty);
  updateFooter();
}

function updateItemBadge(key, itemQty) {
  const valEl = document.getElementById('val_' + key);
  const sobraEl = document.getElementById('sobra_' + key);
  const sobraInline = document.getElementById('sobrainline_' + key);
  if (!valEl) return;
  const comprado = state[key] ? state[key].comprado : itemQty;
  valEl.textContent = comprado;
  const sobra = Math.max(0, comprado - itemQty);
  if (sobraEl) { sobra > 0 ? sobraEl.classList.add('visible') : sobraEl.classList.remove('visible'); sobraEl.innerHTML = `📦 +${sobra} vai p/ estoque`; }
  if (sobraInline) { sobraInline.textContent = sobra > 0 ? `📦 +${sobra} p/ estoque` : ''; }
}

function toggleExtra(key) {
  const el = document.getElementById('extra_' + key);
  const btn = document.getElementById('extrabtn_' + key);
  if (!el) return;
  const open = el.classList.toggle('visible');
  btn.classList.toggle('open', open);
  btn.textContent = open ? '▲ fechar' : '+ comprar extra';
}

function filterAll(btn) { filterMode = 'all'; setActiveBtn(btn); render(); }
function filterPending(btn) { filterMode = 'pending'; setActiveBtn(btn); render(); }
function filterChecked(btn) { filterMode = 'checked'; setActiveBtn(btn); render(); }
function setActiveBtn(btn) {
  document.querySelectorAll('.controls .btn:not(.btn-finalizar)').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleCategory(header) {
  header.nextElementSibling.classList.toggle('hidden');
  header.classList.toggle('collapsed');
}

function resetAll() {
  if (confirm('Resetar todos os itens e quantidades marcadas?')) {
    state = {};
    saveState(); render();
  }
}

// ── MODAL FINALIZAR ──────────────────────────────────────────
function abrirModal() {
  const comprados = ITEMS.filter(i => isChecked(i));
  if (comprados.length === 0) { alert('Nenhum item marcado como comprado ainda.'); return; }

  const sobraItens = comprados.filter(i => Math.max(0, getComprado(i) - i.qty) > 0);

  let html = `<div class="modal-section"><h3>✅ Itens Comprados (${comprados.length})</h3>`;
  comprados.forEach(i => {
    const comp = getComprado(i);
    html += `<div class="modal-item"><span class="modal-item-name">${i.name}</span><span class="modal-item-qty">${comp} un.</span></div>`;
  });
  html += '</div>';

  if (sobraItens.length > 0) {
    html += `<div class="modal-section"><h3>📦 Sobra p/ Estoque (${sobraItens.length} itens)</h3>`;
    sobraItens.forEach(i => {
      const sobra = getComprado(i) - i.qty;
      html += `<div class="modal-item"><span class="modal-item-name">${i.name}</span><span class="modal-item-qty sobra">+${sobra} un.</span></div>`;
    });
    html += '</div>';
  }

  const pendentes = ITEMS.filter(i => !isChecked(i));
  if (pendentes.length > 0) {
    html += `<div class="modal-section"><h3>⚠️ Não comprados (${pendentes.length})</h3>`;
    pendentes.forEach(i => {
      html += `<div class="modal-item"><span class="modal-item-name">${i.name}</span><span class="modal-item-qty">${i.qty} un.</span></div>`;
    });
    html += '</div>';
  }

  document.getElementById('modalSub').textContent = `Responsável: ${responsavel} — Será gravado no Sheets para sua irmã confirmar.`;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('savingMsg').style.display = 'none';
  document.getElementById('modalBtns').style.display = 'flex';
  document.getElementById('overlay').classList.add('visible');
}

function fecharModal() { document.getElementById('overlay').classList.remove('visible'); }

async function confirmarCompra() {
  document.getElementById('modalBtns').style.display = 'none';
  document.getElementById('savingMsg').style.display = 'block';

  const itemsPayload = ITEMS.map(item => ({
    canal:    item.canal,
    name:     item.name,
    qty:      item.qty,
    comprado: getComprado(item),
    sobra:    Math.max(0, getComprado(item) - item.qty),
    status:   isChecked(item) ? 'Comprado' : 'Pendente',
  }));

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'finalizar_compra', items: itemsPayload, responsavel }),
    });
    document.getElementById('savingMsg').innerHTML = '✅ Gravado! Sua irmã pode confirmar no Sheets.';
    setTimeout(fecharModal, 2500);
  } catch(e) {
    document.getElementById('savingMsg').innerHTML = '❌ Erro ao gravar. Tente novamente.';
    document.getElementById('modalBtns').style.display = 'flex';
  }
}

// ── RENDER ───────────────────────────────────────────────────
function updateFooter() {
  const restantes = ITEMS.filter(i => !isChecked(i)).reduce((s, i) => s + i.qty, 0);
  const sobra = ITEMS.reduce((s, i) => s + Math.max(0, getComprado(i) - i.qty), 0);
  document.getElementById('footerTotal').textContent = restantes + ' un.';
  document.getElementById('footerSobra').textContent = sobra + ' un.';
}

function render() {
  const main = document.getElementById('main');
  if (ITEMS.length === 0) {
    main.innerHTML = '<div class="msg-center">Nenhum item na lista.<br>Envie um PDF ao Claude para atualizar.</div>';
    updateFooter(); return;
  }

  const cats = {};
  ITEMS.forEach(item => { if (!cats[item.cat]) cats[item.cat] = []; cats[item.cat].push(item); });

  const total = ITEMS.length;
  const checked = ITEMS.filter(i => isChecked(i)).length;
  document.getElementById('progressFill').style.width = (total ? Math.round(checked/total*100) : 0) + '%';
  document.getElementById('progressLabel').textContent = `${checked} / ${total} itens`;

  let html = '';
  Object.entries(cats).forEach(([cat, items]) => {
    const filtered = items.filter(item => {
      if (filterMode === 'pending') return !isChecked(item);
      if (filterMode === 'checked') return isChecked(item);
      return true;
    });
    if (!filtered.length) return;

    const catChecked = filtered.filter(i => isChecked(i)).length;
    const allDone = catChecked === filtered.length;
    const icon = CAT_ICONS[cat] || '📋';

    html += `<div class="category-block">
      <div class="category-header ${allDone?'done':''}" onclick="toggleCategory(this)">
        <span class="cat-icon">${icon}</span>
        <span class="cat-name">${cat}</span>
        <span class="cat-badge">${catChecked}/${filtered.length}</span>
        <span class="cat-toggle">▾</span>
      </div>
      <div class="items-list">`;

    filtered.forEach(item => {
      const k = getKey(item);
      const chk = isChecked(item);
      const comprado = getComprado(item);
      const sobra = Math.max(0, comprado - item.qty);
      const urgency = (() => { const r=(item.par-item.qty)/item.par; return r<=0.1?'high':r<=0.4?'med':'low'; })();

      html += `<div class="item-row ${chk?'checked':''}">
        <div class="item-main" onclick="toggleCheck('${k}')">
          <div class="item-check">${chk?'✓':''}</div>
          <div class="urgency-dot urgency-${urgency}"></div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-sub">Canal ${item.canal} · ${item.sub} · Estoque loja: ${item.par - item.qty} un.</div>
          </div>
          <div class="item-qty-block">
            <div class="item-qty-need">${item.qty}</div>
            <div class="item-qty-label">necessário</div>
          </div>
        </div>
        <div class="item-extra ${chk?'visible':''}" id="extra_${k}">
          <div class="qty-input-group">
            <label>Comprado:</label>
            <div class="qty-spinner">
              <button class="qty-btn" onclick="changeComprado('${k}',-1,${item.qty})">−</button>
              <span class="qty-val" id="val_${k}">${comprado}</span>
              <button class="qty-btn" onclick="changeComprado('${k}',1,${item.qty})">+</button>
            </div>
          </div>
          <div class="sobra-badge ${sobra>0?'visible':''}" id="sobra_${k}">📦 +${sobra} vai p/ estoque</div>
        </div>
        <div class="item-actions">
          <button class="extra-toggle ${chk?'open':''}" id="extrabtn_${k}" onclick="toggleExtra('${k}')">${chk?'▲ fechar':'+ comprar extra'}</button>
          <span class="sobra-inline" id="sobrainline_${k}">${sobra>0?`📦 +${sobra} p/ estoque`:''}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  main.innerHTML = html;
  updateFooter();
 }

// ── INIT ─────────────────────────────────────────────────────
carregarLista();
</script>
</body>
</html>
